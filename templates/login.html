<!DOCTYPE html>
<html>
<head>
    <title>RL Stats Login</title>
    <style>
        body { display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; background:#222; color:#fff; }
        .login-box { background:#333; padding:20px; border-radius:10px; }
        input { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:none; }
        button { padding:10px; width:100%; background:#4caf50; color:#fff; border:none; border-radius:5px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login Admin</h2>
        <form action="/login" method="post">
            <input type="password" name="code" placeholder="Código Admin" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
